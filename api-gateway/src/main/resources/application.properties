server.port=8080
spring.application.name=api-gateway

# MODERN SPRING CLOUD 2025 CONFIGURATION PATH FOR WEBMVC
spring.cloud.gateway.server.webmvc.routes[0].id=auth-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0].name=Path
spring.cloud.gateway.server.webmvc.routes[0].predicates[0].args.pattern=/api/v1/auth/**

# --- EXPLICITLY CHOP THE PREFIX OFF ---


# --- EUREKA CONFIGURATION ---
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

management.endpoints.web.exposure.include=gateway